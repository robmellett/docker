name: Run Tests

on:
  pull_request:
    branches: ["master"]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        image: ["base", "php84", "php85", "php85-cli"]

    name: Build Containers [${{ matrix.image }}]

    steps:
      - name: Check Out Repo
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          context: ./src/${{ matrix.image }}
          file: ./src/${{ matrix.image }}/Dockerfile
          tags: robmellett/${{ matrix.image }}:test
          build-args: |
            WWWGROUP=1000
            WWWUSER=1000
